<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POM OGIMET — Argentina SYNOP / AEROMET</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e8eef7;
      --muted: #8fa3bf;
      --accent: #3b9eff;
      --accent-dim: #2563a8;
      --ok: #3dd68c;
      --warn: #f5a623;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    header p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-left: auto;
    }
    label { font-size: 0.85rem; color: var(--muted); }
    input[type="number"] {
      width: 64px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }
    button {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.5; cursor: wait; }
    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: calc(100vh - 64px);
    }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; grid-template-rows: 55vh auto; }
    }
    #map { width: 100%; height: 100%; }
    aside {
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      background: var(--panel);
    }
    aside h2 {
      margin: 0 0 4px;
      font-size: 1rem;
    }
    .station-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .placeholder {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .report-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .report-card time {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .aeromet {
      font-family: "Consolas", "Monaco", monospace;
      font-size: 0.95rem;
      color: var(--ok);
      word-break: break-word;
      margin-bottom: 8px;
    }
    .synop-raw {
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.4;
    }
    .status {
      font-size: 0.8rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.loading { background: #1e3a5f; color: var(--accent); }
    .status.error { background: #4a2020; color: #ff8a8a; }
    .status.ok { background: #1a3d2e; color: var(--ok); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>POM OGIMET — Estaciones Argentina</h1>
      <p>__STATION_COUNT__ estaciones · generado __BUILT_AT__ · clic en un punto para ver SYNOP/AEROMET</p>
    </div>
    <div class="controls">
      <label for="hours">Horas hacia atrás</label>
      <input id="hours" type="number" min="1" max="72" value="__DEFAULT_HOURS__" />
      <button id="refreshBtn" type="button">Actualizar estación</button>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <aside>
      <h2 id="panelTitle">Seleccioná una estación</h2>
      <div class="station-meta" id="panelMeta"></div>
      <div id="panelStatus" class="placeholder">
        Hacé clic en un punto del mapa para cargar los SYNOP de las últimas
        <span id="hoursLabel">__DEFAULT_HOURS__</span> horas y ver el AEROMET decodificado.
      </div>
      <div id="reports"></div>
    </aside>
  </main>

  <script>
/*__DECODER_JS__*/
  </script>
  <script>
    const STATIONS = __STATIONS_JSON__;
    const OGIMET_URL = "https://www.ogimet.com/cgi-bin/getsynop";
    const CORS_PROXY = "https://api.allorigins.win/raw?url=";

    let selectedStation = null;

    function pad(n) { return String(n).padStart(2, "0"); }

    function utcRange(hoursBack) {
      const end = new Date();
      end.setUTCMinutes(0, 0, 0);
      const start = new Date(end.getTime() - hoursBack * 3600 * 1000);
      const fmt = (d) => (
        d.getUTCFullYear().toString()
        + pad(d.getUTCMonth() + 1)
        + pad(d.getUTCDate())
        + pad(d.getUTCHours())
        + pad(d.getUTCMinutes())
      );
      return { begin: fmt(start), end: fmt(end) };
    }

    async function fetchText(url) {
      try {
        const res = await fetch(url);
        if (res.ok) return await res.text();
      } catch (_) { /* CORS or network */ }
      const proxied = CORS_PROXY + encodeURIComponent(url);
      const res = await fetch(proxied);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    async function fetchSynops(wmoId, hoursBack) {
      const { begin, end } = utcRange(hoursBack);
      const ind = wmoId.length === 5 ? `0${wmoId}` : wmoId;
      const params = new URLSearchParams({
        begin, end, ind, header: "yes", lang: "eng",
      });
      const url = `${OGIMET_URL}?${params}`;
      const csv = await fetchText(url);
      return parseOgimetCsv(csv).filter((row) => row.wmoId === wmoId);
    }

    function renderMap() {
      const trace = {
        type: "scattermapbox",
        lat: STATIONS.map((s) => s.lat),
        lon: STATIONS.map((s) => s.lon),
        text: STATIONS.map((s) => `${s.name}<br>WMO ${s.wmo_id}`),
        customdata: STATIONS.map((s) => s.wmo_id),
        mode: "markers",
        marker: {
          size: 9,
          color: STATIONS.map((s) => (selectedStation && s.wmo_id === selectedStation.wmo_id ? "#f5a623" : "#3b9eff")),
          opacity: 0.9,
        },
        hovertemplate: "%{text}<extra></extra>",
      };

      const layout = {
        mapbox: {
          style: "open-street-map",
          center: { lat: -38.5, lon: -63.5 },
          zoom: 3.4,
        },
        margin: { t: 0, b: 0, l: 0, r: 0 },
        paper_bgcolor: "#0f1419",
        plot_bgcolor: "#0f1419",
        font: { color: "#e8eef7" },
      };

      Plotly.newPlot("map", [trace], layout, { responsive: true, displayModeBar: true });

      document.getElementById("map").on("plotly_click", (ev) => {
        const idx = ev.points[0].pointIndex;
        selectStation(STATIONS[idx]);
      });
    }

    function setStatus(kind, message) {
      const el = document.getElementById("panelStatus");
      el.className = `status ${kind}`;
      el.textContent = message;
    }

    async function selectStation(station) {
      selectedStation = station;
      renderMap();

      const hours = Number(document.getElementById("hours").value) || 3;
      document.getElementById("panelTitle").textContent = station.name;
      document.getElementById("panelMeta").textContent = (
        `WMO ${station.wmo_id} · ${station.lat.toFixed(3)}°, ${station.lon.toFixed(3)}°`
        + (station.alt != null ? ` · ${station.alt} m` : "")
      );
      document.getElementById("reports").innerHTML = "";
      setStatus("loading", `Cargando SYNOP (últimas ${hours} h)…`);

      try {
        const rows = await fetchSynops(station.wmo_id, hours);
        if (!rows.length) {
          setStatus("error", "No hay SYNOP en el intervalo seleccionado.");
          return;
        }
        setStatus("ok", `${rows.length} parte(s) encontrada(s).`);
        const container = document.getElementById("reports");
        rows.forEach((row) => {
          const decoded = synopToAeromet(row.report, station.name, station.alt || 0);
          const card = document.createElement("div");
          card.className = "report-card";
          const ts = row.datetimeUtc.toISOString().replace("T", " ").slice(0, 16) + " UTC";
          card.innerHTML = `
            <time>${ts}</time>
            <div class="aeromet">${decoded.aeromet}</div>
            <div class="synop-raw">${decoded.raw}</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        setStatus("error", `Error al consultar OGIMET: ${err.message}`);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", () => {
      if (selectedStation) selectStation(selectedStation);
    });

    document.getElementById("hours").addEventListener("change", () => {
      const h = document.getElementById("hours").value;
      document.getElementById("hoursLabel").textContent = h;
    });

    renderMap();
  </script>
</body>
</html>
