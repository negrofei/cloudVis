<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POM OGIMET — Argentina SYNOP / AEROMET</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e8eef7;
      --muted: #8fa3bf;
      --accent: #3b9eff;
      --accent-dim: #2563a8;
      --ok: #3dd68c;
      --warn: #f5a623;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    header p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-left: auto;
    }
    label { font-size: 0.85rem; color: var(--muted); }
    input[type="number"] {
      width: 64px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }
    button {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.5; cursor: wait; }
    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: calc(100vh - 64px);
    }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; grid-template-rows: 55vh auto; }
    }
    #map { width: 100%; height: 100%; }
    aside {
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      background: var(--panel);
    }
    aside h2 {
      margin: 0 0 4px;
      font-size: 1rem;
    }
    .station-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .placeholder {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .report-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .report-card time {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .aeromet {
      font-family: "Consolas", "Monaco", monospace;
      font-size: 0.95rem;
      color: var(--ok);
      word-break: break-word;
      margin-bottom: 8px;
    }
    .synop-raw {
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.4;
    }
    .status {
      font-size: 0.8rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.loading { background: #1e3a5f; color: var(--accent); }
    .status.error { background: #4a2020; color: #ff8a8a; }
    .status.ok { background: #1a3d2e; color: var(--ok); }
  </style>
</head>

      </div>
      <div id="reports"></div>

  <script>
/**
 * SYNOP (FM-12) → AEROMET decoder for Argentina SMN-style reports.
 * Cloud base: hh × 50 m (national convention), height in AEROMET rounded up to 100 ft.
 */

const CLOUD_TYPE_C = {
  0: 'Ci', 1: 'Cc', 2: 'Cs', 3: 'Ac', 4: 'As', 5: 'Ns', 6: 'Sc', 7: 'St', 8: 'Cu', 9: 'Cb',
};

function visibilityKm(vv) {
  const code = Number(vv);
  if (Number.isNaN(code)) return null;
  if (code <= 49) return Math.max(0.1, (code * 100) / 1000);
  if (code >= 50 && code <= 80) return code - 50;
  if (code === 81) return 30;
  if (code === 82) return 40;
  if (code === 83) return 50;
  if (code === 84) return 60;
  if (code === 85) return 70;
  if (code === 86) return 80;
  if (code === 87) return 90;
  if (code >= 88) return 100;
  return null;
}

function cloudBaseFeet(hh) {
  const code = Number(hh);
  if (Number.isNaN(code)) return null;
  if (code === 0) return 0;
  const meters = code * 50;
  const feet = meters * 3.280839895;
  return Math.ceil(feet / 100) * 100;
}

function signedTemp(sn, ttt) {
  const sign = Number(sn) === 1 ? -1 : 1;
  return sign * Number(ttt) / 10;
}

function parseGroups(report) {
  const tokens = report.replace(/=/g, ' ').trim().split(/\s+/).filter(Boolean);
  const idx333 = tokens.indexOf('333');
  const idx555 = tokens.indexOf('555');
  const section1End = idx333 >= 0 ? idx333 : tokens.length;
  const section3End = idx555 >= 0 ? idx555 : tokens.length;

  return {
    tokens,
    section1: tokens.slice(0, section1End),
    section3: idx333 >= 0 ? tokens.slice(idx333 + 1, section3End) : [],
    section555: idx555 >= 0 ? tokens.slice(idx555 + 1) : [],
  };
}

function isFiveDigitGroup(token) {
  return token.length === 5 && /^\d+$/.test(token);
}

function headerEndIndex(section1) {
  const aaxx = section1.indexOf('AAXX');
  if (aaxx >= 0 && aaxx + 3 < section1.length) return aaxx + 3;
  return Math.min(3, section1.length);
}

function isTemperatureGroup(g) {
  return g[0] === '1' && (g[1] === '0' || g[1] === '1');
}

function isIrixhvvGroup(g) {
  return g[0] === '1' && !isTemperatureGroup(g);
}

function isNddffGroup(g) {
  const n = Number(g[0]);
  return n >= 0 && n <= 4 && Number(g.slice(1, 3)) <= 36;
}

function extractSection1Fields(section1) {
  const fields = {
    irixhvv: null,
    nddff: null,
    tempC: null,
    dewpointC: null,
    stationPressureHpa: null,
    seaLevelPressureHpa: null,
    cloudLayers8: [],
  };

  const body = section1.slice(headerEndIndex(section1));
  let seenIrixhvv = false;

  for (const token of body) {
    if (!isFiveDigitGroup(token)) continue;
    const g = token;
    const ind = g[0];

    if (!seenIrixhvv && isIrixhvvGroup(g)) {
      fields.irixhvv = {
        ir: Number(g[1]),
        ix: Number(g[2]),
        h: Number(g[3]),
        vv: Number(g.slice(3, 5)),
      };
      seenIrixhvv = true;
      continue;
    }

    if (seenIrixhvv && fields.nddff === null && isNddffGroup(g)) {
      fields.nddff = { n: Number(g[0]), dd: Number(g.slice(1, 3)), ff: Number(g.slice(3)) };
      continue;
    }

    if (ind === '1' && isTemperatureGroup(g)) {
      fields.tempC = signedTemp(g[1], g.slice(2));
      continue;
    }

    if (ind === '2' && (g[1] === '0' || g[1] === '1')) {
      fields.dewpointC = signedTemp(g[1], g.slice(2));
      continue;
    }

    if (ind === '3') {
      fields.stationPressureHpa = 1000 + Number(g.slice(1)) / 10;
      continue;
    }

    if (ind === '4') {
      fields.seaLevelPressureHpa = 1000 + Number(g.slice(1)) / 10;
      continue;
    }

    if (ind === '8' && g[3] !== '/' && g[4] !== '/') {
      const amount = Number(g[1]);
      const typeCode = Number(g[2]);
      const hh = Number(g.slice(3));
      if (amount > 0) fields.cloudLayers8.push({ amount, typeCode, hh, section: 1 });
    }
  }

  return fields;
}

function extractCloudLayers(groups, section) {
  const layers = [];
  for (const token of groups) {
    if (!isFiveDigitGroup(token) || token[0] !== '8') continue;
    if (token[3] === '/' || token[4] === '/') continue;
    const amount = Number(token[1]);
    const typeCode = Number(token[2]);
    const hh = Number(token.slice(3));
    if (amount > 0 && !Number.isNaN(typeCode) && !Number.isNaN(hh)) {
      layers.push({ amount, typeCode, hh, section });
    }
  }
  return layers;
}

function pickAerometCloud(layers) {
  if (!layers.length) return null;
  const sorted = [...layers].sort((a, b) => {
    const ha = cloudBaseFeet(a.hh) ?? 99999;
    const hb = cloudBaseFeet(b.hh) ?? 99999;
    return ha - hb;
  });
  const layer = sorted[0];
  const type = CLOUD_TYPE_C[layer.typeCode] || 'XX';
  const heightFt = cloudBaseFeet(layer.hh);
  if (heightFt === null) return null;
  return { amount: layer.amount, type, heightFt, text: `${layer.amount}${type}${heightFt}FT` };
}

function formatTemp(value) {
  if (value === null || Number.isNaN(value)) return '//';
  const rounded = Math.round(value);
  const sign = rounded < 0 ? 'M' : '';
  const abs = Math.abs(rounded).toString().padStart(2, '0');
  return `${sign}${abs}`;
}

function formatWind(nddff) {
  if (!nddff) return '///KT';
  if (nddff.ff === 0) return '00000KT';
  const dir = (nddff.dd * 10).toString().padStart(3, '0');
  const spd = nddff.ff.toString().padStart(2, '0');
  return `${dir}/${spd}KT`;
}

function formatVisibilityKm(irixhvv) {
  if (!irixhvv) return '////';
  const km = visibilityKm(irixhvv.vv);
  if (km === null) return '////';
  if (km >= 10) return `${Math.round(km)}KM`;
  return `${km.toFixed(1)}KM`;
}

function formatQnh(seaLevelPressureHpa) {
  if (seaLevelPressureHpa === null || Number.isNaN(seaLevelPressureHpa)) return 'Q////';
  return `Q${seaLevelPressureHpa.toFixed(1)}`;
}

function synopToAeromet(report, stationName = 'ESTACION', stationAltM = 0) {
  const { section1, section3, section555 } = parseGroups(report);
  const s1 = extractSection1Fields(section1);
  const layers = [
    ...extractCloudLayers(section3, 3),
    ...extractCloudLayers(section555, 555),
    ...s1.cloudLayers8,
  ];
  const cloud = pickAerometCloud(layers);

  const parts = [
    stationName.toUpperCase(),
    formatWind(s1.nddff),
    formatVisibilityKm(s1.irixhvv),
    cloud ? cloud.text : 'SKC',
    `${formatTemp(s1.tempC)}/${formatTemp(s1.dewpointC)}`,
    formatQnh(s1.seaLevelPressureHpa),
  ];

  return {
    aeromet: parts.join(' '),
    fields: { ...s1, cloud, layers },
    raw: report.trim(),
    stationAltM,
  };
}

function parseOgimetCsv(csvText) {
  const lines = csvText.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i += 1) {
    const line = lines[i];
    const commaIdx = [];
    for (let j = 0; j < line.length; j += 1) {
      if (line[j] === ',') commaIdx.push(j);
    }
    if (commaIdx.length < 6) continue;
    const sixth = commaIdx[5];
    const meta = line.slice(0, sixth).split(',');
    const report = line.slice(sixth + 1);
    if (!report || report.includes('NIL')) continue;
    const wmoId = meta[0];
    rows.push({
      wmoId,
      year: Number(meta[1]),
      month: Number(meta[2]),
      day: Number(meta[3]),
      hour: Number(meta[4]),
      minute: Number(meta[5]),
      report,
      datetimeUtc: new Date(Date.UTC(Number(meta[1]), Number(meta[2]) - 1, Number(meta[3]), Number(meta[4]), Number(meta[5]))),
    });
  }
  return rows.sort((a, b) => b.datetimeUtc - a.datetimeUtc);
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { synopToAeromet, parseOgimetCsv, cloudBaseFeet, visibilityKm };
}

    const OGIMET_URL = "https://www.ogimet.com/cgi-bin/getsynop";
    const CORS_PROXY = "https://api.allorigins.win/raw?url=";

    let selectedStation = null;

    function pad(n) { return String(n).padStart(2, "0"); }

    function utcRange(hoursBack) {
      const end = new Date();
      end.setUTCMinutes(0, 0, 0);
      const start = new Date(end.getTime() - hoursBack * 3600 * 1000);
      const fmt = (d) => (
        d.getUTCFullYear().toString()
        + pad(d.getUTCMonth() + 1)
        + pad(d.getUTCDate())
        + pad(d.getUTCHours())
        + pad(d.getUTCMinutes())
      );
      return { begin: fmt(start), end: fmt(end) };
    }

    async function fetchText(url) {
      try {
        const res = await fetch(url);
        if (res.ok) return await res.text();
      } catch (_) { /* CORS or network */ }
      const proxied = CORS_PROXY + encodeURIComponent(url);
      const res = await fetch(proxied);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    async function fetchSynops(wmoId, hoursBack) {
      const { begin, end } = utcRange(hoursBack);
      const ind = wmoId.length === 5 ? `0${wmoId}` : wmoId;
      const params = new URLSearchParams({
        begin, end, ind, header: "yes", lang: "eng",
      });
      const url = `${OGIMET_URL}?${params}`;
      const csv = await fetchText(url);
      return parseOgimetCsv(csv).filter((row) => row.wmoId === wmoId);
    }

    function renderMap() {
      const trace = {
        type: "scattermapbox",
        lat: STATIONS.map((s) => s.lat),
        lon: STATIONS.map((s) => s.lon),
        text: STATIONS.map((s) => `${s.name}<br>WMO ${s.wmo_id}`),
        customdata: STATIONS.map((s) => s.wmo_id),
        mode: "markers",
        marker: {
          size: 9,
          color: STATIONS.map((s) => (selectedStation && s.wmo_id === selectedStation.wmo_id ? "#f5a623" : "#3b9eff")),
          opacity: 0.9,
        },
        hovertemplate: "%{text}<extra></extra>",
      };

      const layout = {
        mapbox: {
          style: "open-street-map",
          center: { lat: -38.5, lon: -63.5 },
          zoom: 3.4,
        },
        margin: { t: 0, b: 0, l: 0, r: 0 },
        paper_bgcolor: "#0f1419",
        plot_bgcolor: "#0f1419",
        font: { color: "#e8eef7" },
      };

      Plotly.newPlot("map", [trace], layout, { responsive: true, displayModeBar: true });

      document.getElementById("map").on("plotly_click", (ev) => {
        const idx = ev.points[0].pointIndex;
        selectStation(STATIONS[idx]);
      });
    }

    function setStatus(kind, message) {
      const el = document.getElementById("panelStatus");
      el.className = `status ${kind}`;
      el.textContent = message;
    }

    async function selectStation(station) {
      selectedStation = station;
      renderMap();

      const hours = Number(document.getElementById("hours").value) || 3;
      document.getElementById("panelTitle").textContent = station.name;
      document.getElementById("panelMeta").textContent = (
        `WMO ${station.wmo_id} · ${station.lat.toFixed(3)}°, ${station.lon.toFixed(3)}°`
        + (station.alt != null ? ` · ${station.alt} m` : "")
      );
      document.getElementById("reports").innerHTML = "";
      setStatus("loading", `Cargando SYNOP (últimas ${hours} h)…`);

      try {
        const rows = await fetchSynops(station.wmo_id, hours);
        if (!rows.length) {
          setStatus("error", "No hay SYNOP en el intervalo seleccionado.");
          return;
        }
        setStatus("ok", `${rows.length} parte(s) encontrada(s).`);
        const container = document.getElementById("reports");
        rows.forEach((row) => {
          const decoded = synopToAeromet(row.report, station.name, station.alt || 0);
          const card = document.createElement("div");
          card.className = "report-card";
          const ts = row.datetimeUtc.toISOString().replace("T", " ").slice(0, 16) + " UTC";
          card.innerHTML = `
            <time>${ts}</time>
            <div class="aeromet">${decoded.aeromet}</div>
            <div class="synop-raw">${decoded.raw}</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        setStatus("error", `Error al consultar OGIMET: ${err.message}`);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", () => {
      if (selectedStation) selectStation(selectedStation);
    });

    document.getElementById("hours").addEventListener("change", () => {
      const h = document.getElementById("hours").value;
      document.getElementById("hoursLabel").textContent = h;
    });

    renderMap();
  </script>
